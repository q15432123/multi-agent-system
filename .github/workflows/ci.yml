name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compile all Python files
        run: python -c "import py_compile,os;[py_compile.compile(os.path.join(r,f),doraise=True) for r,_,fs in os.walk('engine') for f in fs if f.endswith('.py')];print('All compiled OK')"
      - name: Check tool registry
        run: python -c "from engine.tools.registry import get_tool_schemas;print(f'{len(get_tool_schemas())} tools registered')"
      - name: Check DNA registry
        run: python -c "from engine.dna.dna_registry import load_all;load_all();print('DNA registry OK')"
      - name: Check queue module
        run: python -c "from engine.queue import task_queue;print('Queue OK')"
      - name: Check agent runner
        run: python -c "from engine.agent_runner import agent_runner;print('Agent runner OK')"
